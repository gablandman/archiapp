<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <title>Messages</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Forum</h1>
    </header>

    <main>
        <h2>Messages</h2>
        <ul id="message-list">
            <li>Premier message de test</li>
            <li>Deuxième message</li>
            <li>Troisième message</li>
            <li>Quatrième message</li>
            <li>Cinquième message</li>
        </ul>

        <h2>Nouveau message</h2>
        <input type="text" id="pseudo-input" placeholder="Pseudo">
        <textarea id="message-input" rows="3" placeholder="Votre message"></textarea>
        <br>
        <button id="send-btn">Envoyer</button>
        <button id="theme-btn">Changer thème</button>
    </main>

    <footer>
        <p>TP ArchiApp Gabriel Landman</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
